<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div class="home">
                <h3>HOMEYY</h3>
                <div class="score">0</div>
                <div class="buttons">
                    <button  class="btn-home" data-points="1">+1</button>
                    <button  class="btn-home" data-points="2">+2</button>
                    <button  class="btn-home" data-points="3">+3</button>
                </div>
            </div>
            <div class="guest">
                <h3>AWAY</h3> 
                <div id="guest-score" class="score">0</div>
                <div class="buttons">
                    <button class="btn-guest" id="guest1" data-points="1">+1</button>
                    <button class="btn-guest" id="guest2" data-points="2">+2</button>
                    <button class="btn-guest" id="guest3" data-points="3">+3</button>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
